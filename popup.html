<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCenter Report</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1d23;
      color: #e4e6eb;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid #2d3139;
    }

    .header .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
    }

    .header h1 span {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: #8b8f98;
    }

    /* --- Configuración rápida --- */
    .config-section {
      margin-bottom: 16px;
    }

    .config-section label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8b8f98;
      margin-bottom: 6px;
    }

    .config-section select,
    .config-section input {
      width: 100%;
      padding: 8px 10px;
      background: #23272e;
      border: 1px solid #2d3139;
      border-radius: 6px;
      color: #e4e6eb;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .config-section select:focus,
    .config-section input:focus {
      border-color: #22c55e;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row .config-section {
      flex: 1;
    }

    /* --- Botón principal --- */
    #btn-generate {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    #btn-generate:hover {
      opacity: 0.9;
    }

    #btn-generate:active {
      transform: scale(0.98);
    }

    #btn-generate:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* --- Estado / Log --- */
    #status {
      margin-top: 14px;
      padding: 10px 12px;
      background: #23272e;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.6;
      color: #8b8f98;
      display: none;
      max-height: 140px;
      overflow-y: auto;
    }

    #status.visible {
      display: block;
    }

    #status .log-line {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    #status .log-line::before {
      content: '›';
      color: #22c55e;
      font-weight: 700;
    }

    #status .log-line.error::before {
      content: '✕';
      color: #ef4444;
    }

    #status .log-line.success::before {
      content: '✓';
      color: #22c55e;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">HC</div>
    <h1>
      MediCenter Report
      <span>Extractor automático de reportes</span>
    </h1>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       CONFIGURACIÓN RÁPIDA (opcional):
       Estos campos permiten al usuario sobreescribir valores
       desde el popup sin tocar el código. Si no los necesitas,
       puedes eliminar esta sección y hardcodear en content.js.
       ══════════════════════════════════════════════════════════ -->
  <div class="row">
    <div class="config-section">
      <label>Fecha desde</label>
      <input type="date" id="fecha-desde" value="2026-04-01">
    </div>
    <div class="config-section">
      <label>Fecha hasta</label>
      <input type="date" id="fecha-hasta" value="2026-04-13">
    </div>
  </div>

  <button id="btn-generate">Generar y Descargar Reporte</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
